metrics:
  - sharpe_ratio
  - sortino_ratio
  - calmar_ratio
  - max_drawdown
  - cagr
  - annual_volatility
  - hit_rate
  - profit_factor
  - avg_holding_days
  - win_loss_ratio

spread_metrics:
  - half_life
  - hurst_exponent
  - cointegration_pvalue
  - kalman_beta_stability
  - signal_accuracy

rolling:
  window_days: 252

bootstrap:
  n_samples: 10000
  confidence_level: 0.95
  random_state: 42

benchmarks:
  no_trade:
    description: "Zero return (mean-reversion null hypothesis)"
  static_ols:
    description: "Same signals but with static OLS hedge ratios"
  equal_weight:
    description: "1/N across all spreads, no signal"

stress_periods:
  oil_crash_2008:
    start: "2008-07-01"
    end: "2009-03-31"
  wti_brent_break:
    start: "2011-01-01"
    end: "2013-12-31"
  covid_negative_wti:
    start: "2020-03-01"
    end: "2020-05-31"
  energy_spike_2022:
    start: "2022-02-01"
    end: "2022-06-30"
