portfolio_regime:
  proxy: "vix"
  vix_symbol: "^VIX"
  thresholds: [15, 25]
  labels: ["calm", "moderate", "stressed"]

spread_regime:
  method: "rolling_volatility"
  window_days: 20
  percentile_thresholds: [33, 80]
  labels: ["stable", "widening", "broken"]

conditioned_params:
  calm:
    entry_z: 1.5
    exit_z: 0.3
    stop_z: 4.0
    position_scalar: 1.0
    max_holding_days: 60
  moderate:
    entry_z: 2.0
    exit_z: 0.5
    stop_z: 3.5
    position_scalar: 0.6
    max_holding_days: 40
  stressed:
    entry_z: 3.0
    exit_z: 0.5
    stop_z: 3.0
    position_scalar: 0.2
    max_holding_days: 20
